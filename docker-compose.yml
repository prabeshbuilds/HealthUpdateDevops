version: '3.9'

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: health
      POSTGRES_USER: health_user
      POSTGRES_PASSWORD: health123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8021:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_DB: health
      POSTGRES_USER: health_user
      POSTGRES_PASSWORD: health123
      POSTGRES_HOST: db
    command: >
      sh -c "python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    restart: always

volumes:
  pgdata: